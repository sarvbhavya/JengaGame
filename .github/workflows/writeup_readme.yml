name: Writeup-Readme

on:
  push:
    branches: 
      - 'main'
    paths:
      - 'writeup.pdf'
      - '.README.md'
      - '.github/workflows/writeup_readme.yml'

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      ORPHAN_BRANCH: readme_images
      QUALITY: 85
      DPI: 250
    steps:
    # Updated to v4
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # Required to let the runner push changes back to the repo
        persist-credentials: true 

    ## CONVERT THE ACTUAL IMAGES
    - name: Convert Writeup to Images
      run: |
        # 1. Modify the default Ubuntu ImageMagick security policy to allow PDF reading/writing
        sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml
        
        # 2. Run the conversion directly on the runner
        convert -density ${{env.DPI}} -trim -colorspace sRGB -alpha remove writeup.pdf -quality ${{env.QUALITY}} output-%03d.jpg

    ## COMMIT THEM TO AN ORPHAN BRANCH
    - name: Commit and push images to orphan branch
      run: | 
        git checkout --orphan ${{env.ORPHAN_BRANCH}}
        touch .README.md
        mv .README.md .README.temp
        git rm -rf .
        git add *.jpg
        git config --local user.email "action@github.com"
        git config --local user.name "GithubActions"
        git commit -m "Updated writeup images" -a
        
        # Replaced the third-party push action with a standard git command
        git push -f origin ${{env.ORPHAN_BRANCH}}

    ## UPDATE README IN BRANCH IF IT NEEDS TO BE UPDATED
    - name: Update Readme
      id: main
      run: |
        echo $'\n' >> .README.temp
        for filename in *.jpg; do \
          echo '![image](https://github.com/'$GITHUB_REPOSITORY'/blob/${{env.ORPHAN_BRANCH}}/'$filename'?raw=true)' >> .README.temp;  \
        done
        git checkout ${{ github.ref }}
        rm README.md || (exit 0)
        mv .README.temp README.md
        OUTPUT=0
        git diff --exit-code README.md || OUTPUT=$?
        
        # Fixed the deprecated set-output command
        echo "OUTPUT=$OUTPUT" >> $GITHUB_OUTPUT
        
    - name: Commit new README (if changed)
      if: steps.main.outputs.OUTPUT == '1'
      run: |
        git add README.md
        git config --local user.email "action@github.com"
        git config --local user.name "GithubActions"
        git commit -m "Updated Readme" -a
        
        # Replaced the third-party push action with a standard git command
        git push origin HEAD:${{ github.ref }}